# Número total de kimarites definidos en este archivo
kimarite.count=15

# ── Técnicas de Empuje (Oshi-zumō) ──────────────────────────
kimarite.1.nombre=Oshi-dashi
kimarite.1.descripcion=Empujar directamente al oponente fuera del ring con ambas manos en el torso

kimarite.2.nombre=Tsuki-dashi
kimarite.2.descripcion=Empujar al oponente fuera del ring con golpes de palma abierta al torso

kimarite.3.nombre=Oshi-taoshi
kimarite.3.descripcion=Derribar al oponente empujándolo hacia el suelo dentro del ring

kimarite.4.nombre=Tsuki-taoshi
kimarite.4.descripcion=Derribar al oponente con golpes de palma abierta hasta el suelo

# ── Técnicas de Agarre (Yotsu-zumō) ────────────────────────
kimarite.5.nombre=Yorikiri
kimarite.5.descripcion=Forzar al oponente fuera del ring aferrándose al mawashi con ambas manos

kimarite.6.nombre=Yoritaoshi
kimarite.6.descripcion=Derribar al oponente con agarre del mawashi empujándolo hacia el suelo

kimarite.7.nombre=Uwatenage
kimarite.7.descripcion=Lanzar al oponente con un barrido de brazo desde el agarre exterior del mawashi

kimarite.8.nombre=Shitatenage
kimarite.8.descripcion=Lanzar al oponente con un barrido de brazo desde el agarre interior del mawashi

kimarite.9.nombre=Kotenage
kimarite.9.descripcion=Lanzar al oponente usando el codo para voltear su brazo hacia afuera

# ── Técnicas de Barrido y Derribo ──────────────────────────
kimarite.10.nombre=Hatakikomi
kimarite.10.descripcion=Abofetear hacia abajo al oponente que avanza, haciéndolo caer

kimarite.11.nombre=Hikiotoshi
kimarite.11.descripcion=Tirar del brazo del oponente hacia abajo para desequilibrarlo

kimarite.12.nombre=Sotogake
kimarite.12.descripcion=Enganche exterior de pierna para derribar al oponente

kimarite.13.nombre=Uchigake
kimarite.13.descripcion=Enganche interior de pierna para derribar al oponente

# ── Técnicas Especiales ──────────────────────────────────────
kimarite.14.nombre=Kirikaeshi
kimarite.14.descripcion=Reversa del cuerpo con barrido de pierna para voltear al oponente

kimarite.15.nombre=Tsuriotoshi
kimarite.15.descripcion=Levantar completamente al oponente y dejarlo caer dentro del ring
